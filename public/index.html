Вот простой пример HTML-страницы с текстом "AI работает 🔥":

```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI работает</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>
    <div>AI работает 🔥</div>
</body>
</html>
```

Скопируйте этот код в текстовый файл с расширением `.html` (например, `index.html`) и откройте его в веб-браузере, чтобы увидеть страницу.
