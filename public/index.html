<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Привет</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f9fafb;
    color: #333;
  }
  header {
    background: #4f46e5;
    padding: 1rem 2rem;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    margin: 0;
    font-weight: 700;
  }
  nav a {
    color: #c7d2fe;
    text-decoration: none;
    margin-left: 1.5rem;
    font-weight: 600;
    transition: color 0.3s ease;
  }
  nav a:hover {
    color: #a5b4fc;
  }
  main {
    max-width: 960px;
    margin: 2rem auto;
    padding: 0 1rem;
    text-align: center;
  }
  main h2 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }
  main p {
    font-size: 1.2rem;
    margin-bottom: 2rem;
    color: #555;
  }
  main img {
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  footer {
    background: #1e293b;
    color: #94a3b8;
    text-align: center;
    padding: 1rem 2rem;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<header>
  <h1>Привет</h1>
  <nav>
    <a href="#home">Главная</a>
    <a href="#about">О нас</a>
    <a href="#contact">Контакты</a>
  </nav>
</header>
<main>
  <h2>Добро пожаловать!</h2>
  <p>Это современный и красивый сайт с навигацией и футером.</p>
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" alt="Красивый пейзаж с природой" />
</main>
<footer>
  &copy; 2024 Привет. Все права защищены.
</footer>
</body>
</html>
