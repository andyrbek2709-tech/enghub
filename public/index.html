Вот пример современного лендинга с темным фоном, кнопкой и заголовком. HTML и CSS находятся внутри одного файла:

```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Современный Лендинг</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .button {
            padding: 15px 30px;
            font-size: 18px;
            color: #fff;
            background-color: #ff5722;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .button:hover {
            background-color: #e64a19;
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать</h1>
    <button class="button">Начать</button>
</body>
</html>
```

Скопируй этот код в файл `index.html`, и открой его в браузере, чтобы увидеть лендинг.
