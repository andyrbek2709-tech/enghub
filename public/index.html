<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Велосипеды</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #F1F3F5;
    color: #121212;
  }
  header {
    background-color: #2F2E41;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header nav a {
    color: white;
    margin-left: 30px;
    font-weight: 700;
    font-size: 12px;
    text-decoration: none;
    text-transform: uppercase;
  }
  header nav a:first-child {
    margin-left: 0;
  }
  main {
    max-width: 1110px;
    margin: 40px auto 80px auto;
    padding: 0 20px;
  }
  h1 {
    font-weight: 700;
    font-size: 40px;
    margin: 0 0 16px;
    max-width: 520px;
    line-height: 48px;
  }
  .subtitle {
    font-size: 18px;
    max-width: 520px;
    margin: 0 0 40px;
    color: #2F2E41;
    line-height: 28px;
  }
  .buttons {
    margin-bottom: 40px;
  }
  .btn {
    font-weight: 700;
    font-size: 12px;
    border-radius: 12px;
    padding: 12px 20px;
    margin-right: 28px;
    cursor: pointer;
    border: none;
    text-transform: uppercase;
    box-shadow: 0 10px 30px rgba(204 204 204 / 0.25);
  }
  .btn-primary {
    background-color: #FFC145;
    color: #2F2E41;
    box-shadow: 0 10px 30px rgba(255 193 69 / 0.3);
  }
  .btn-secondary {
    background-color: #D9D9D9;
    color: #2F2E41;
  }

  section.gallery {
    display: flex;
    justify-content: space-between;
    gap: 30px;
  }
  figure {
    margin: 0;
    flex: 1;
    max-width: 320px;
    background-color: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(204 204 204 / 0.25);
  }
  figure img {
    width: 100%;
    display: block;
    height: 220px;
    object-fit: cover;
  }
  figcaption {
    padding: 24px 30px;
  }
  figcaption h3 {
    font-weight: 700;
    font-size: 20px;
    margin: 0 0 12px;
    max-width: 220px;
    line-height: 28px;
  }
  figcaption p {
    margin: 0;
    font-size: 12px;
    color: #2F2E41;
    opacity: 0.7;
    max-width: 220px;
  }
</style>
</head>
<body>
<header>
  <div></div>
  <nav>
    <a href="#">Главная</a>
    <a href="#">Каталог</a>
    <a href="#">Контакты</a>
  </nav>
</header>
<main>
  <h1>Велосипеды для твоих приключений</h1>
  <p class="subtitle">Лучшие велосипеды, которые помогут тебе исследовать мир. Качество и стиль для любого маршрута.</p>
  <div class="buttons">
    <button class="btn btn-primary">Купить</button>
    <button class="btn btn-secondary">Подробнее</button>
  </div>
  <section class="gallery">
    <figure>
      <img src="https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf?auto=format&fit=crop&w=400&q=80" alt="Велосипед в горах" />
      <figcaption>
        <h3>Горный велосипед</h3>
        <p>Прочный велосипед для любых условий и непростых маршрутов.</p>
      </figcaption>
    </figure>
    <figure>
      <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=400&q=80" alt="Городской велосипед" />
      <figcaption>
        <h3>Городской велосипед</h3>
        <p>Удобный и стильный велосипед для прогулок по городу.</p>
      </figcaption>
    </figure>
    <figure>
      <img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=400&q=80" alt="Дорожный велосипед" />
      <figcaption>
        <h3>Дорожный велосипед</h3>
        <p>Легкий и быстрый велосипед для дальних поездок.</p>
      </figcaption>
    </figure>
  </section>
</main>
</body>
</html>
