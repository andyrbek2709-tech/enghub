<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Современный сайт</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f9fafb;
    color: #333;
  }
  header {
    background-color: #0d6efd;
    color: white;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header .logo {
    font-weight: 700;
    font-size: 1.5rem;
  }
  nav ul {
    list-style: none;
    display: flex;
    gap: 1.5rem;
    margin: 0;
    padding: 0;
  }
  nav li a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
  }
  nav li a:hover {
    color: #b6d4ff;
  }
  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 2rem;
  }
  .hero {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    background: white;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgb(13 110 253 / 0.15);
  }
  .hero img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    flex: 1 1 400px;
    object-fit: cover;
  }
  .hero-content {
    flex: 1 1 400px;
  }
  .hero-content h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    color: #0d6efd;
  }
  .hero-content p {
    font-size: 1.125rem;
    line-height: 1.6;
    color: #555;
    margin-bottom: 2rem;
  }
  .hero-content button {
    background-color: #0d6efd;
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  .hero-content button:hover {
    background-color: #084cdf;
  }
  footer {
    background-color: #212529;
    color: #cbd5e1;
    text-align: center;
    padding: 1rem 2rem;
    font-size: 0.9rem;
  }

  @media (max-width: 768px) {
    .hero {
      flex-direction: column;
    }
    nav ul {
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">ModernSite</div>
  <nav>
    <ul>
      <li><a href="#home" aria-label="Главная">Главная</a></li>
      <li><a href="#about" aria-label="О нас">О нас</a></li>
      <li><a href="#services" aria-label="Услуги">Услуги</a></li>
      <li><a href="#contact" aria-label="Контакты">Контакты</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="hero" id="home" aria-label="Главный раздел">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" alt="Современный городской пейзаж" />
    <div class="hero-content">
      <h1>Добро пожаловать на ModernSite</h1>
      <p>Создаём красивые и современные веб-сайты с удобной навигацией и адаптивным дизайном.</p>
      <button type="button">Узнать больше</button>
    </div>
  </section>
</main>

<footer>
  &copy; 2024 ModernSite. Все права защищены.
</footer>

</body>
</html>
