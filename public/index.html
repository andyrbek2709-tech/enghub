<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>/clear</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #f0f4f8, #d9e2ec);
    color: #212121;
  }
  header {
    background: #0b82f7;
    color: #fff;
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 8px rgb(11 130 247 / 0.4);
  }
  header h1 {
    margin: 0;
    font-weight: 700;
    font-size: 1.6rem;
  }
  nav a {
    color: #def1ff;
    text-decoration: none;
    margin-left: 1.7rem;
    font-weight: 600;
    font-size: 1rem;
    transition: color 0.3s ease;
  }
  nav a:hover {
    color: #fff;
  }
  main {
    max-width: 900px;
    margin: 2rem auto 4rem;
    padding: 0 1.5rem;
    text-align: center;
  }
  main h2 {
    font-weight: 700;
    font-size: 2rem;
    margin-bottom: 0.6rem;
  }
  main p {
    font-weight: 400;
    font-size: 1.1rem;
    color: #444;
  }
  section.content-image {
    margin-top: 2.5rem;
  }
  section.content-image img {
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 6px 16px rgb(0 0 0 / 0.1);
  }
  footer {
    background: #0b82f7;
    color: #def1ff;
    text-align: center;
    padding: 1rem 2rem;
    font-weight: 600;
    font-size: 0.95rem;
    box-shadow: 0 -3px 8px rgb(11 130 247 / 0.4);
  }

</head>
<body>
<header>
  <h1>/clear</h1>
  <nav>
    <a href="#about">О проекте</a>
    <a href="#image">Изображение</a>
    <a href="#footer">Контакты</a>
  </nav>
</header>
<main>
  <section id="about">
    <h2>Добро пожаловать на сайт "/clear"</h2>

  </section>
  <section id="image" class="content-image" aria-label="Фотография подчёркивающая концепт clear">
    <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=900&q=80" alt="Минималистичный светлый интерьер с чистыми линиями и прозрачным пространством" />
